<div class="inu-page-layout">
  <section class="inu-page-layout-section">
    <div class="inu-page-layout-sidebar">
      @if(menuTemplate()){
        <ng-container *ngTemplateOutlet="menuTemplate()"></ng-container>
      }
      @else {
        <inu-aside-menu [links]="links()"></inu-aside-menu>
      }
    </div>
    <div class="inu-page-layout-content">
      <ng-content/>
    </div>
  </section>
  <div class="inu-page-layout-bottom-margin"></div>
</div>
